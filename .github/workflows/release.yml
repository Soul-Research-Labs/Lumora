name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p lumora-rpc -p lumora-cli

      - name: Run tests
        run: cargo test --workspace --lib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lumora-binaries
          path: |
            target/release/lumora-rpc
            target/release/lumora-cli

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lumora-binaries
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Extract the section between ## [$TAG] and the next ## header
          awk "/^## \[${TAG}\]/{flag=1;next}/^## \[/{flag=0}flag" CHANGELOG.md > release_notes.md
          # If no version-specific section found, use the [Unreleased] section
          if [ ! -s release_notes.md ]; then
            awk '/^## \[Unreleased\]/{flag=1;next}/^## \[/{flag=0}flag' CHANGELOG.md > release_notes.md
          fi
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: true
          files: |
            dist/lumora-rpc
            dist/lumora-cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  crate-check:
    name: Crate Publish Dry Run
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Dry-run publish (no upload)
        run: |
          for crate in lumora-primitives lumora-note lumora-tree \
                       lumora-circuits lumora-prover lumora-verifier \
                       lumora-contracts lumora-node lumora-client lumora-sdk; do
            echo "==> Checking $crate"
            cargo publish -p "$crate" --dry-run --allow-dirty 2>&1 || true
          done

  docker-push:
    name: Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

  sdk-publish:
    name: Publish SDKs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Publish TypeScript SDK
        working-directory: sdks/typescript
        run: |
          npm ci && npm run build
          npm publish --access public || echo "::warning::npm publish skipped (version may already exist)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Publish Python SDK
        working-directory: sdks/python
        run: |
          pip install build twine
          python -m build
          twine upload dist/* || echo "::warning::PyPI publish skipped (version may already exist)"
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
